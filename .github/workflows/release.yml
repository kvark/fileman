name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            variant: vulkan
            rustflags: ""
            suffix: ""
          - os: ubuntu-latest
            variant: gles
            rustflags: "--cfg gles"
            suffix: "-gles"
          - os: windows-latest
            variant: default
            rustflags: ""
            suffix: ""
          - os: macos-latest
            variant: default
            rustflags: ""
            suffix: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # --- Linux ---
      - name: Install packaging tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-bundle --git https://github.com/burtonageo/cargo-bundle --rev 17cc8eb --locked
          cargo install cargo-deb cargo-generate-rpm

      - name: Build + bundle with self-update (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo bundle --release --features self-update
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Package tarball (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          tar -C target/release -czf dist/fileman-linux-x86_64${{ matrix.suffix }}.tar.gz fileman

      - name: Package AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          cp target/release/bundle/appimage/fileman_*_x86_64.AppImage dist/fileman-linux-x86_64${{ matrix.suffix }}.AppImage

      - name: Rebuild without self-update for packages (Linux Vulkan)
        if: matrix.os == 'ubuntu-latest' && matrix.variant == 'vulkan'
        run: cargo build --release --bin fileman

      - name: Package deb + rpm (Linux Vulkan)
        if: matrix.os == 'ubuntu-latest' && matrix.variant == 'vulkan'
        run: |
          cargo deb --no-build
          cp target/debian/*.deb dist/
          cargo generate-rpm
          cp target/generate-rpm/*.rpm dist/

      # --- macOS ---
      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cargo install cargo-bundle --git https://github.com/burtonageo/cargo-bundle --rev 17cc8eb --locked
          rustup target add aarch64-apple-darwin
          cargo bundle --release --target aarch64-apple-darwin --features self-update,vendored-openssl

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist
          APP=target/aarch64-apple-darwin/release/bundle/osx/FileMan.app
          codesign --sign - --deep --force "$APP"
          # ZIP for self-update compatibility
          ditto -c -k --sequesterRsrc --keepParent "$APP" dist/fileman-macos-aarch64.zip
          # DMG for drag-to-install
          mkdir -p dmg_staging
          cp -R "$APP" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname FileMan -srcfolder dmg_staging -ov -format UDZO dist/fileman-macos-aarch64.dmg

      # --- Windows ---
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: cargo build --release --bin fileman --features self-update

      - name: Package zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/release/fileman.exe -DestinationPath dist/fileman-windows-x86_64.zip

      - name: Package MSI (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cargo install cargo-wix
          cargo wix init --force -B target/release/fileman.exe
          cargo wix --no-build --nocapture
          Copy-Item target/wix/*.msi dist/

      # --- Upload ---
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
