name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings

  build-gles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build (GLES)
        run: cargo build
        env:
          RUSTFLAGS: "--cfg gles"
      - name: Test (GLES)
        run: cargo test
        env:
          RUSTFLAGS: "--cfg gles"
      - name: Clippy (GLES)
        run: cargo clippy -- -D warnings
        env:
          RUSTFLAGS: "--cfg gles"

  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: cargo check
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings

  sftp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up local SSH server
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server
          sudo systemctl start ssh
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N ""
          cat ~/.ssh/id_ed25519.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          ssh-keyscan -H localhost >> ~/.ssh/known_hosts 2>/dev/null
          # Verify connectivity
          ssh -o BatchMode=yes localhost echo "SSH OK"
      - name: Run SFTP tests
        run: cargo test --test sftp_localhost -- --ignored

  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install software rendering deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libvulkan1 mesa-vulkan-drivers
      - name: Build replay binary
        run: cargo build --release --bin fileman
      - name: Run replay cases
        run: scripts/replay_runner.sh
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: replay-artifacts
          path: |
            target/test-artifacts
            etc/snapshots
