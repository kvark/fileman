name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings

  ci-status:
    if: always()
    needs: [build-test, replay]
    runs-on: ubuntu-latest
    steps:
      - name: Successful
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Failing
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install software rendering deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libvulkan1 mesa-vulkan-drivers
      - name: Build replay binary
        run: cargo build --release --bin fileman
      - name: Run replay cases
        run: scripts/replay_runner.sh
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: replay-artifacts
          path: |
            target/test-artifacts
            etc/snapshots
