name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings

  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install software rendering deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libvulkan1 mesa-vulkan-drivers
      - name: Select lavapipe ICD
        run: |
          icd=""
          for candidate in /usr/share/vulkan/icd.d/*lvp*.json /usr/share/vulkan/icd.d/*.json; do
            if [ -f "$candidate" ]; then
              icd="$candidate"
              break
            fi
          done
          if [ -z "$icd" ]; then
            echo "No Vulkan ICD found in /usr/share/vulkan/icd.d" >&2
            exit 1
          fi
          echo "VK_ICD_FILENAMES=$icd" >> $GITHUB_ENV
      - name: Build replay binary
        run: cargo build --release --bin fileman
      - name: Run replay cases
        run: scripts/replay_runner.sh
      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: replay-artifacts
          path: |
            target/test-artifacts
            etc/snapshots
