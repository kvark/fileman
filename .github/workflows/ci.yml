name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install software rendering deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libvulkan1 mesa-vulkan-drivers
      - name: Select lavapipe ICD
        run: |
          icd=""
          for candidate in /usr/share/vulkan/icd.d/*lvp*.json /usr/share/vulkan/icd.d/*.json; do
            if [ -f "$candidate" ]; then
              icd="$candidate"
              break
            fi
          done
          if [ -z "$icd" ]; then
            echo "No Vulkan ICD found in /usr/share/vulkan/icd.d" >&2
            exit 1
          fi
          echo "VK_ICD_FILENAMES=$icd" >> $GITHUB_ENV
      - name: Build snapshot
        run: cargo run --bin fileman -- --snapshot /tmp/screen.png
      - name: Compare snapshot
        run: |
          test -f etc/snapshots/linux.png
          cargo run --bin snapshot_compare -- /tmp/screen.png etc/snapshots/linux.png --max-channel-diff 200 --max-pixel-fraction 0.003
