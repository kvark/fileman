name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings

  build-gles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build (GLES)
        run: cargo build
        env:
          RUSTFLAGS: "--cfg gles"
      - name: Test (GLES)
        run: cargo test
        env:
          RUSTFLAGS: "--cfg gles"
      - name: Clippy (GLES)
        run: cargo clippy -- -D warnings
        env:
          RUSTFLAGS: "--cfg gles"

  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
      - name: Build release
        run: cargo build --release
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings

  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install software rendering deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libvulkan1 mesa-vulkan-drivers
      - name: Build replay binary
        run: cargo build --release --bin fileman
      - name: Run replay cases
        run: scripts/replay_runner.sh
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: replay-artifacts
          path: |
            target/test-artifacts
            etc/snapshots
