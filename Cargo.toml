[package]
name = "fileman"
version = "0.1.0"
edition = "2024"
default-run = "fileman"

[package.metadata.bundle]
name = "Fileman"
identifier = "com.fileman.app"
icon = ["etc/macos/icon.png"]

[dependencies]
anyhow = "1.0"
log = "0.4"
env_logger = "0.11"
zune-core = "0.4"
zune-bmp = "0.4"
zune-image = { version = "0.4", default-features = false, features = ["jpeg", "png", "bmp", "metadata"] }
gif = "0.14"
image-webp = "0.2"
png = "0.17"
exif = { package = "kamadak-exif", version = "0.5.5" }
zip = { version = "0.6", default-features = false, features = ["deflate", "time"] }
tar = "0.4"
flate2 = "1.0"
bzip2 = "0.6.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"
ron = "0.8"
blade-egui = "0.7"
blade-graphics = "0.7"
egui = "0.33"
egui-winit = "0.33"
winit = "0.30.5"
once_cell = "1.19"
syntect = "5"
memchr = "2.7"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
users = "0.11"
